<body class="page-news">
    <div class="site-shell">
            <header class="site-top">
                <div class="hero-bar">
                    <a class="hero-logo" href="index.html">
                        <img src="logo.png" alt="Allstar Galaxy Logo">
                    </a>

                    <div class="hero-title">
                        <img src="images/banner/navigation-title-news.png"
                             onerror="this.onerror=null;this.src='images/banner/navigation-title.png';"

                    </div>

                    <a class="hero-logo-right" href="index.html">
                        <img src="logo.png" alt="Allstar Galaxy Logo">
                    </a>
                </div>

                <nav>
                    <a class="" href="index.html">Home</a>
                    <a class="" href="team.html">Team</a>
                    <a class="" href="schedule.html">Schedule</a>

            <div class="hero-image hero-news"></div>

            <main>
                <section id="news" class="news-section">
                    <div class="grid news-grid">
                        <article class="card news-card">
                            <div class="card-icon">📰</div>
                            <div class="card-content">
                                <h3>Latest News</h3>
                                <span>Coming Soon</span>
                            </div>
                        </article>

                        <article class="card news-card">
                            <div class="card-icon">⚽</div>
                            <div class="card-content">
                                <h3>Match Updates</h3>
                                <span>Coming Soon</span>
                            </div>
                        </article>

                        <a class="card news-card" href="mailto:allstargalaxy@example.com">
                            <div class="card-icon">✉</div>
                            <div class="card-content">

                                <span>Email the Team</span>
                            </div>
                        </a>
                    </div>
                </section>

            <footer>
                <div class="footer-social-row">
                    <a href="index.html" class="footer-logo footer-logo-left" aria-label="Allstar Galaxy Home">
                        <img src="logo.png" alt="Allstar Galaxy Logo">
                    </a>

                    <div class="footer-social">
                        <a href="#" target="_blank"><img src="images/social/youtube.png" alt="YouTube"></a>

                    <a href="index.html" class="footer-logo footer-logo-right" aria-label="Allstar Galaxy Home">
                        <img src="logo.png" alt="Allstar Galaxy Logo">
                    </a>
                </div>

                <p class="footer-small">© 2026 Allstar Galaxy.</p>
            </footer>

            <script src="script.js?v=63"></script>
