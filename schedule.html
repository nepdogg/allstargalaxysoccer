<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css?v=58">
</head>

<body class="page-schedule">
    <div class="site-shell">
            <header class="site-top">
                <div class="hero-bar">
                    <a class="hero-logo" href="index.html">
                        <img src="logo.png" alt="Allstar Galaxy Logo">
                    </a>

                    <div class="hero-title">
                        <img src="images/banner/navigation-title-schedule.png"
                             onerror="this.onerror=null;this.src='images/banner/navigation-title.png';"
                             alt="The Official Home of the Allstar Galaxy">
                    </div>

                    <a class="hero-logo-right" href="index.html">
                        <img src="logo.png" alt="Allstar Galaxy Logo">
                    </a>
                </div>

                <nav>
                    <a class="" href="index.html">Home</a>
                    <a class="" href="team.html">Team</a>
                    <a class="active" href="schedule.html">Schedule</a>
                    <a class="" href="media.html">Media</a>
                    <a class="" href="news.html">News</a>
                    <a class="" href="livestream.html">Live</a>
                    <a class="" href="follow.html">Follow</a>
                </nav>
            </header>

            <div class="hero-image hero-schedule"></div>

            <main>
                <section id="schedule" class="schedule-page-section">
                    <div class="schedule-grid schedule-image-grid">
                        <article class="table-card schedule-image-card">
                            <h3>Match Schedule</h3>
                            <a class="schedule-lightbox-link" href="images/schedule/match-schedule.png?v=56" target="_blank" rel="noopener" data-lightbox-title="Match Schedule">
                                <img src="images/schedule/match-schedule.png?v=56" alt="Allstar Galaxy match schedule for Fair Oaks Cancha #2">
                                <span class="schedule-image-action">Click to view full schedule</span>
                            </a>
                        </article>

                        <article class="table-card schedule-image-card">
                            <h3>League Standings</h3>
                            <a class="schedule-lightbox-link" href="images/schedule/standings.png?v=56" target="_blank" rel="noopener" data-lightbox-title="League Standings">
                                <img src="images/schedule/standings.png?v=56" alt="Sunnyvale Soccer League standings with Allstar Galaxy highlighted">
                                <span class="schedule-image-action">Click to view full standings</span>
                            </a>
                        </article>
                    </div>
                </section>
            </main>


            <div class="schedule-image-lightbox" id="scheduleImageLightbox" aria-hidden="true">
                <button class="schedule-lightbox-close" type="button" aria-label="Close schedule preview">×</button>
                <div class="schedule-lightbox-stage">
                    <h2 class="schedule-lightbox-title">Schedule</h2>
                    <img class="schedule-lightbox-image" src="" alt="">
                    <a class="schedule-lightbox-open" href="#" target="_blank" rel="noopener">Open Original Image</a>
                </div>
            </div>

            <footer>
                <div class="footer-social-row">
                    <a href="index.html" class="footer-logo footer-logo-left" aria-label="Allstar Galaxy Home">
                        <img src="logo.png" alt="Allstar Galaxy Logo">
                    </a>

                    <div class="footer-social">
                        <a href="#" target="_blank"><img src="images/social/youtube.png" alt="YouTube"></a>
                        <a href="#" target="_blank"><img src="images/social/instagram.png" alt="Instagram"></a>
                        <a href="#" target="_blank"><img src="images/social/facebook.png" alt="Facebook"></a>
                        <a href="#" target="_blank"><img src="images/social/tiktok.png" alt="TikTok"></a>
                        <a href="#" target="_blank"><img src="images/social/x.png" alt="X"></a>
                        <a class="footer-email" href="mailto:allstargalaxy@example.com" aria-label="Email Allstar Galaxy" title="Email Allstar Galaxy">✉</a>
                    </div>

                    <a href="index.html" class="footer-logo footer-logo-right" aria-label="Allstar Galaxy Home">
                        <img src="logo.png" alt="Allstar Galaxy Logo">
                    </a>

                <p class="footer-small">© 2026 Allstar Galaxy.</p>
            </footer>
